name: Build, Test & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FlatPlanet.Platform.slnx

      - name: Build
        run: dotnet build FlatPlanet.Platform.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test FlatPlanet.Platform.Tests --configuration Release --no-build --no-restore

      - name: Publish
        run: dotnet publish FlatPlanet.Platform.API --configuration Release --no-build --output ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: flatplanet-api
          package: ./publish
